bot:
  poll_interval_seconds: 15          # Ultra-fast: 2× the reaction speed of the old 30s tick
  dry_run: false                     # LIVE — real money, real orders, real fills
  auto_start: false                  # Don't auto-start on server boot — require manual Start click
  max_concurrent_orders: 10         # Scaled for $36 balance — room for ~5 entries + ~5 exits in flight
  startup_balance_timeout_seconds: 20
  startup_sync_timeout_seconds: 25
  balance_refresh_timeout_seconds: 15
  log_level: INFO

ai_observer:
  enabled: true
  provider: auto                     # Anthropic/OpenAI if configured; otherwise heuristic-only fallback
  model: claude-haiku-4-5-20251001
  openai_model: gpt-4o-mini
  run_interval_seconds: 300          # Advisory scan every 5m, off the critical trading path
  max_logs: 60
  max_reports: 2
  issues_only: true                  # Only escalate when logs/P&L actually look suspicious
  write_to_logs: true
  repeated_error_threshold: 3
  recent_loss_streak_threshold: 3
  recent_pnl_window: 5
  critical_recent_loss_usdc: 0.25

capital:
  reserve_pct: 10

circuit_breaker:
  max_daily_loss_usdc: 7         # $7 max daily loss (~20% of $36 balance — aggressive circuit breaker)
  max_drawdown_pct: 0.20         # Stop if down more than 20% from session-start balance (~$2.40 on $12)
  max_consecutive_losses: 5      # Stop after 5 straight losing trades
  max_recent_loss_usdc: 0.25     # Small-account guard: stop if recent closed-trade cluster loses 25c
  recent_loss_window: 5          # Evaluate the last 5 closed trades for clustered churn
  max_orders_per_minute: 15      # Runaway loop guard — halt if >15 orders placed in 60s

strategies:

  near_certainty:
    enabled: true
    capital_pct: 30                  # 30% × $36 = $10.80 — room for 2 concurrent $5 trades
    min_price: 0.93
    max_hours_to_resolution: 168     # 7 days — avoids season futures that churn out on spread/fees
    min_market_volume: 0
    order_size_usdc: 5               # Meets 5-share floor at all prices ≤$1 (scaled for $36 balance)
    min_net_return_pct: 1.0
    use_kelly_sizing: true           # Size by edge magnitude (Kelly criterion)
    kelly_fraction: 0.25             # Quarter-Kelly for safety

  inverted_near_certainty:           # Buy NO on markets where YES < 7 cents
    enabled: true
    capital_pct: 30                  # 30% × $36 = $10.80 — room for 2 concurrent $5 trades
    max_yes_price: 0.07              # YES must be priced below $0.07
    max_hours_to_resolution: 168     # 7 days — same guardrail as near_certainty
    min_market_volume: 0
    order_size_usdc: 5               # Meets 5-share floor at all prices ≤$1 (scaled for $36 balance)
    min_net_return_pct: 1.0
    use_kelly_sizing: true
    kelly_fraction: 0.25

  market_making:
    enabled: true
    capital_pct: 25
    min_daily_volume: 0              # sorts by volume, makes markets on highest-vol first
    spread_pct: 0.02
    max_open_orders_per_market: 2
    order_size_usdc: 5               # Raised from 2 → 5 so NO-side orders clear the 5-share minimum at $0.98
    num_markets: 3                   # Fewer markets while balance is tiny
    refresh_interval_seconds: 30     # Tighter quote refresh for fast-moving markets

  logical_arb:
    enabled: true
    capital_pct: 15
    min_arb_pct: 0.03
    order_size_usdc: 5               # Meets 5-share floor at all prices ≤$1 (scaled for $36 balance)
    min_outcomes: 2

  ai_trader:
    enabled: true
    capital_pct: 15                  # Reduced — whale_tracker is a new alpha source
    order_size_usdc: 5               # Meets 5-share floor at all prices ≤$1 (scaled for $36 balance)
    min_edge_pct: 0.08               # Lowered from 12% → 8% — ensemble was too restrictive
    min_market_price: 0.10
    max_market_price: 0.90
    max_markets_per_run: 8           # Analyse max 8 markets per hour (API cost control)
    run_interval_seconds: 3600       # Run every 60 minutes
    wait_log_interval_seconds: 300   # Log scheduled idle countdown at most every 5 min
    cache_ttl_seconds: 7200          # Cache AI estimates for 2 hours
    model: claude-haiku-4-5-20251001
    use_kelly_sizing: true
    kelly_fraction: 0.25
    # Ensemble disabled — Claude+GPT always disagreed on current market inventory,
    # resulting in zero trades. Claude alone is more decisive.
    ensemble_enabled: false
    openai_model: gpt-4o-mini
    # Bayesian calibration — how much to trust AI per category (1.0 = full trust)
    calibration:
      politics: 0.80
      sports: 0.65
      crypto: 0.60
      finance: 0.70
      weather: 0.55
      default: 0.75

  whale_tracker:
    enabled: true
    capital_pct: 15                  # 15% of portfolio for momentum trades
    order_size_usdc: 5               # Meets 5-share floor at all prices ≤$1 (scaled for $36 balance)
    max_trades_per_day: 10           # Hard cap — focus on only the best whale-led moves
    wallet_refresh_seconds: 1800     # Re-rank wallets every 30 minutes
    top_holder_markets: 40           # Candidate markets used to discover elite wallets
    top_holders_per_market: 5        # Pull only the biggest holders per market
    max_ranked_wallets: 150          # Score up to 150 wallets per refresh cycle
    wallet_closed_positions_limit: 20
    wallet_rank_concurrency: 12
    min_wallet_closed_trades: 3
    min_ranked_wallet_win_rate: 0.50
    min_wallet_score: 70             # Only follow wallets with strong realized P&L + hit rate
    recent_trade_window_seconds: 900 # Only copy fresh whale prints from the last 15 minutes
    recent_trades_fetch_limit: 300
    min_whale_trade_usdc: 250        # Ignore tiny prints — only follow meaningful size
    trade_signal_cooldown_seconds: 1800
    min_holder_balance: 1
    min_market_price: 0.10
    max_market_price: 0.90
    fallback_to_momentum: true       # Keep legacy signal path if ranked wallet flow is quiet
    min_move_pct: 0.05               # 5% price move triggers entry
    lookback_ticks: 8                # Compare to 8 ticks ago (~2 min at 15s/tick)
    top_markets: 300                 # Raised from 30 → 300: NBA MVP markets dominate top 30 at <10¢,
                                     # all filtered by mid>0.10 gate. Need wider scan to find 10-90¢ markets.
    min_net_return_pct: 0.5          # Lower bar than near-certainty — short-term hold
    use_kelly_sizing: true
    kelly_fraction: 0.20             # More conservative for momentum

  position_monitor:
    enabled: true
    take_profit_pct: 0.02            # Exit on any 2% gain — fast capital recycling on tight-spread markets
    stop_loss_pct: 0.05              # Exit when position is down 5% — tight stops
    exit_size_usdc: 200              # Max USDC per exit order
    pending_exit_stale_seconds: 300  # Cancel/retry resting exits that sit unfilled for 5 minutes
    hard_exit_retry_seconds: 60      # Avoid hammering CLOB when a market has no bid to sell into
    max_hold_hours:                  # Force-exit after this many hours (per strategy)
      whale_tracker: 0.5             # Momentum fades fast — 30 min hard cap
      ai_trader: 1                   # AI edge should realize inside an hour or it's wrong
      logical_arb: 0.5               # Arb gaps close in minutes
      near_certainty: 168            # Let bounded near-certainty trades age toward resolution
      inverted_near_certainty: 168   # Same — avoid 1h forced churn on NO positions
      default: 0.5                   # Nothing sits longer than 30 min

  cross_platform_arb:
    enabled: false                   # Disabled — Kalshi approval pending
    capital_pct: 0
    min_arb_pct: 0.02
    order_size_usdc: 100

  news_catalyst:
    enabled: true
    capital_pct: 10                  # 10% of portfolio for news-driven trades
    order_size_usdc: 5               # Meets Polymarket 5-share minimum at most prices
    run_interval_seconds: 120        # Poll headlines every 2 min (respects NewsAPI free tier)
    max_headlines_per_run: 10        # Top N headlines scanned per run
    max_markets_in_prompt: 40        # How many candidate markets Claude sees per headline
    min_confidence: high             # Only trade on "high" confidence classifier output
    slug_cooldown_seconds: 3600      # Don't re-trade the same market within 1 hour
    model: claude-haiku-4-5-20251001 # Cheap, fast classification model
    news_country: us                 # Top-headlines country code
