bot:
  poll_interval_seconds: 30
  dry_run: false
  max_concurrent_orders: 5          # Scaled for $12 balance (raise to 40 when funded)
  log_level: INFO

capital:
  reserve_pct: 10

circuit_breaker:
  max_daily_loss_usdc: 4         # $4 max daily loss (scaled for $12 test balance — raise when funded)
  max_drawdown_pct: 0.20         # Stop if down more than 20% from session-start balance (~$2.40 on $12)
  max_consecutive_losses: 5      # Stop after 5 straight losing trades
  max_orders_per_minute: 15      # Runaway loop guard — halt if >15 orders placed in 60s

strategies:

  near_certainty:
    enabled: true
    capital_pct: 20
    min_price: 0.93
    max_hours_to_resolution: 72      # Only buy markets resolving within 3 days
    min_market_volume: 0
    order_size_usdc: 2               # Scaled for $12 balance (raise to 50 when funded)
    min_net_return_pct: 1.0
    use_kelly_sizing: true           # Size by edge magnitude (Kelly criterion)
    kelly_fraction: 0.25             # Quarter-Kelly for safety

  inverted_near_certainty:           # Buy NO on markets where YES < 7 cents
    enabled: true
    capital_pct: 20
    max_yes_price: 0.07              # YES must be priced below $0.07
    max_hours_to_resolution: 72      # Only buy markets resolving within 3 days
    min_market_volume: 0
    order_size_usdc: 2               # Scaled for $12 balance
    min_net_return_pct: 1.0
    use_kelly_sizing: true
    kelly_fraction: 0.25

  market_making:
    enabled: true
    capital_pct: 25
    min_daily_volume: 0              # sorts by volume, makes markets on highest-vol first
    spread_pct: 0.02
    max_open_orders_per_market: 2
    order_size_usdc: 2               # Scaled for $12 balance
    num_markets: 3                   # Fewer markets while balance is tiny
    refresh_interval_seconds: 60

  logical_arb:
    enabled: true
    capital_pct: 15
    min_arb_pct: 0.03
    order_size_usdc: 2               # Scaled for $12 balance
    min_outcomes: 2

  ai_trader:
    enabled: true
    capital_pct: 15                  # Reduced — whale_tracker is a new alpha source
    order_size_usdc: 2               # Scaled for $12 balance (raise to 50 when funded)
    min_edge_pct: 0.12               # Need ≥12% gap between AI estimate and market price
    min_market_price: 0.10
    max_market_price: 0.90
    max_markets_per_run: 8           # Analyse max 8 markets per hour (API cost control)
    run_interval_seconds: 3600       # Run every 60 minutes
    cache_ttl_seconds: 7200          # Cache AI estimates for 2 hours
    model: claude-haiku-4-5-20251001
    use_kelly_sizing: true
    kelly_fraction: 0.25
    # Ensemble: set ensemble_enabled: true and add OPENAI_API_KEY to env vars
    ensemble_enabled: true
    openai_model: gpt-4o-mini
    # Bayesian calibration — how much to trust AI per category (1.0 = full trust)
    calibration:
      politics: 0.80
      sports: 0.65
      crypto: 0.60
      finance: 0.70
      weather: 0.55
      default: 0.75

  whale_tracker:
    enabled: true
    capital_pct: 15                  # 15% of portfolio for momentum trades
    order_size_usdc: 2               # Scaled for $12 balance
    min_move_pct: 0.05               # 5% price move triggers entry
    lookback_ticks: 4                # Compare to 4 ticks ago (~2 min at 30s/tick)
    top_markets: 30                  # Monitor top 30 markets by volume
    min_net_return_pct: 0.5          # Lower bar than near-certainty — short-term hold
    use_kelly_sizing: true
    kelly_fraction: 0.20             # More conservative for momentum

  position_monitor:
    enabled: true
    take_profit_pct: 0.15            # Exit when position is up 15%
    stop_loss_pct: 0.08              # Exit when position is down 8% (tighter for fast trading)
    exit_size_usdc: 200              # Max USDC per exit order
    max_hold_hours:                  # Force-exit after this many hours (per strategy)
      whale_tracker: 2               # Momentum fades in <1h; 2h is the hard cap
      ai_trader: 6                   # AI edge window — price converges within hours
      logical_arb: 24               # Arb gaps rarely persist more than a day
      near_certainty: 48            # Fast-resolution holds only; exit if not filled
      inverted_near_certainty: 48
      default: 24                   # Catch-all for any strategy not listed

  cross_platform_arb:
    enabled: false                   # Disabled — Kalshi approval pending
    capital_pct: 0
    min_arb_pct: 0.02
    order_size_usdc: 100

  news_catalyst:
    enabled: false
    capital_pct: 0
    reaction_window_seconds: 10
    order_size_usdc: 100
