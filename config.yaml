bot:
  poll_interval_seconds: 30
  dry_run: false
  max_concurrent_orders: 40
  log_level: INFO

capital:
  reserve_pct: 10

strategies:

  near_certainty:
    enabled: true
    capital_pct: 20
    min_price: 0.93
    max_hours_to_resolution: 8760    # Scan all markets (up to 1yr out)
    min_market_volume: 0
    order_size_usdc: 50
    min_net_return_pct: 1.0

  inverted_near_certainty:           # Buy NO on markets where YES < 7 cents
    enabled: true
    capital_pct: 20
    max_yes_price: 0.07              # YES must be priced below $0.07
    max_hours_to_resolution: 8760    # Scan all markets (up to 1yr out)
    min_market_volume: 0
    order_size_usdc: 50
    min_net_return_pct: 1.0

  market_making:
    enabled: true
    capital_pct: 30
    min_daily_volume: 0              # No volume floor — will refine once we see field names
    spread_pct: 0.02
    max_open_orders_per_market: 4
    order_size_usdc: 100
    num_markets: 20
    refresh_interval_seconds: 60

  logical_arb:
    enabled: true
    capital_pct: 20
    min_arb_pct: 0.03
    order_size_usdc: 100
    min_outcomes: 2

  cross_platform_arb:
    enabled: false                   # Disabled — Kalshi approval pending
    capital_pct: 0
    min_arb_pct: 0.02
    order_size_usdc: 100

  news_catalyst:
    enabled: false
    capital_pct: 0
    reaction_window_seconds: 10
    order_size_usdc: 100
